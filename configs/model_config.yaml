data:
  raw_path: data/raw/steel_plates_faults.csv
  processed_path: data/processed
  test_size: 0.2
  random_state: 42

model:
  type: random_forest
  params:
    n_estimators: 100
    max_depth: 15
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42

mlflow:
  experiment_name: steel-fault-detection
  tracking_uri: http://localhost:5000

serving:
  host: 0.0.0.0
  port: 8000
  model_path: models/model.joblib

monitoring:
  reference_data_path: data/processed/train.csv
  drift_threshold: 0.05
