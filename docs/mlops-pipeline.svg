<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="pipeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="serve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="cicd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" letter-spacing="0.5">Steel Fault Detection — MLOps Pipeline</text>

  <!-- Subtle grid dots -->
  <g fill="#334155" opacity="0.3">
    <circle cx="30" cy="30" r="1"/><circle cx="60" cy="30" r="1"/><circle cx="90" cy="30" r="1"/>
    <circle cx="810" cy="490" r="1"/><circle cx="840" cy="490" r="1"/><circle cx="870" cy="490" r="1"/>
  </g>

  <!-- ===== PIPELINE ROW (main flow) ===== -->

  <!-- Data Ingestion -->
  <rect x="30" y="80" width="150" height="90" rx="10" fill="url(#pipeline)" filter="url(#shadow)" opacity="0.95"/>
  <text x="105" y="118" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Data Ingestion</text>
  <text x="105" y="138" text-anchor="middle" fill="#bfdbfe" font-size="10">UCI Steel Plates</text>
  <text x="105" y="153" text-anchor="middle" fill="#bfdbfe" font-size="10">1,941 records</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="125" x2="218" y2="125" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Preprocessing -->
  <rect x="220" y="80" width="150" height="90" rx="10" fill="url(#pipeline)" filter="url(#shadow)" opacity="0.95"/>
  <text x="295" y="118" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Preprocessing</text>
  <text x="295" y="138" text-anchor="middle" fill="#bfdbfe" font-size="10">Scale / Encode / Split</text>
  <text x="295" y="153" text-anchor="middle" fill="#bfdbfe" font-size="10">ETL Pipeline</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="125" x2="408" y2="125" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Training -->
  <rect x="410" y="80" width="150" height="90" rx="10" fill="url(#pipeline)" filter="url(#shadow)" opacity="0.95"/>
  <text x="485" y="118" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Training</text>
  <text x="485" y="138" text-anchor="middle" fill="#bfdbfe" font-size="10">Random Forest</text>
  <text x="485" y="153" text-anchor="middle" fill="#bfdbfe" font-size="10">scikit-learn</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="125" x2="598" y2="125" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Evaluation -->
  <rect x="600" y="80" width="150" height="90" rx="10" fill="url(#pipeline)" filter="url(#shadow)" opacity="0.95"/>
  <text x="675" y="118" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Evaluation</text>
  <text x="675" y="138" text-anchor="middle" fill="#bfdbfe" font-size="10">Quality Gates</text>
  <text x="675" y="153" text-anchor="middle" fill="#bfdbfe" font-size="10">Acc / F1 Thresholds</text>

  <!-- Arrow down from Evaluation to Serving -->
  <line x1="675" y1="170" x2="675" y2="228" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="690" y="205" fill="#6ee7b7" font-size="9" font-weight="500">PASS</text>

  <!-- ===== SERVING BOX ===== -->
  <rect x="600" y="230" width="270" height="100" rx="10" fill="url(#serve)" filter="url(#shadow)" opacity="0.95"/>
  <text x="735" y="268" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Model Serving</text>
  <text x="735" y="290" text-anchor="middle" fill="#d1fae5" font-size="11">FastAPI  /predict  /health</text>
  <text x="735" y="310" text-anchor="middle" fill="#d1fae5" font-size="10">Docker + Uvicorn</text>

  <!-- ===== MLFLOW TRACKING ===== -->
  <rect x="30" y="230" width="340" height="100" rx="10" fill="url(#track)" filter="url(#shadow)" opacity="0.95"/>
  <text x="200" y="268" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">MLflow Experiment Tracking</text>
  <text x="200" y="290" text-anchor="middle" fill="#ede9fe" font-size="11">Parameters / Metrics / Artifacts</text>
  <text x="200" y="310" text-anchor="middle" fill="#ede9fe" font-size="10">Model Registry + Versioning</text>

  <!-- Arrow from Training down to MLflow -->
  <line x1="485" y1="170" x2="485" y2="195" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="485" y1="195" x2="372" y2="195" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="372" y1="195" x2="372" y2="228" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="440" y="190" fill="#c4b5fd" font-size="9" font-weight="500">LOG</text>

  <!-- ===== MONITORING ===== -->
  <rect x="30" y="380" width="340" height="100" rx="10" fill="url(#monitor)" filter="url(#shadow)" opacity="0.95"/>
  <text x="200" y="418" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="600">Drift Monitoring</text>
  <text x="200" y="440" text-anchor="middle" fill="#451a03" font-size="11">Evidently AI — Data Drift Reports</text>
  <text x="200" y="460" text-anchor="middle" fill="#451a03" font-size="10">Retrain Trigger on Threshold Breach</text>

  <!-- Arrow from Serving down to Monitoring -->
  <line x1="675" y1="330" x2="675" y2="360" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="675" y1="360" x2="372" y2="360" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="372" y1="360" x2="372" y2="378" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-yellow)"/>
  <text x="530" y="354" fill="#fcd34d" font-size="9" font-weight="500">PRODUCTION DATA</text>

  <!-- Retrain arrow from Monitoring back up to Training -->
  <line x1="30" y1="430" x2="15" y2="430" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="15" y1="430" x2="15" y2="125" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="15" y1="125" x2="28" y2="125" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-yellow)"/>
  <text x="20" y="290" fill="#fcd34d" font-size="9" font-weight="500" transform="rotate(-90, 20, 290)">RETRAIN</text>

  <!-- ===== CI/CD ===== -->
  <rect x="600" y="380" width="270" height="100" rx="10" fill="url(#cicd)" filter="url(#shadow)" opacity="0.95"/>
  <text x="735" y="418" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">CI/CD Pipeline</text>
  <text x="735" y="440" text-anchor="middle" fill="#fce7f3" font-size="11">GitHub Actions</text>
  <text x="735" y="460" text-anchor="middle" fill="#fce7f3" font-size="10">Lint → Test → Build → Deploy</text>

  <!-- Connection line between CI/CD and Serving -->
  <line x1="835" y1="380" x2="835" y2="332" stroke="#f472b6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="845" y="358" fill="#f9a8d4" font-size="9" font-weight="500">DEPLOY</text>

</svg>
